apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  # labels of deployment resource
  labels:
    app: mysql
    tier: mysql
    project: expense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
      tier: mysql
      project: expense
  template:
    metadata:
      labels:
        app: mysql
        tier: mysql
        project: expense
spec:
  containers:
  - name: mysql
    image: mahe1120/mysql:1.0.0





